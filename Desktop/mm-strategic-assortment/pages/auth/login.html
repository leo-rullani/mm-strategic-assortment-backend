<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>MM Strategic Assortment – Log in</title>

    <link
        rel="stylesheet"
        href="../../shared/css/variables.css"
    />

    <link
        rel="stylesheet"
        href="../../shared/css/standard.css"
    />

    <link
        rel="stylesheet"
        href="../../shared/css/fonts.css"
    />

    <link
        rel="stylesheet"
        href="../../shared/css/assets.css"
    />

    <link
        rel="stylesheet"
        href="../../shared/css/form.css"
    />

    <link
        rel="stylesheet"
        href="../../shared/css/header_footer.css"
    />

    <!-- Allgemeines MediaMarkt-Theme zuerst -->
    <link
        rel="stylesheet"
        href="../../shared/css/mm_theme.css"
    />

    <!-- Auth-Styles müssen zuletzt geladen werden -->
    <link
        rel="stylesheet"
        href="./auth.css"
    />

    <link
        rel="icon"
        href="../../assets/icons/mm-flow-mark.svg"
        type="image/svg+xml"
    />

    <script src="../../shared/js/config.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/ui_helper.js"></script>
    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/header.js"></script>

    <script
        src="./mouse_trail.js"
        defer
    ></script>
</head>

<body onload="setHeader()">
    <!-- Mouse-Trail -->
    <div
        id="xy"
        aria-hidden="true"
    ></div>

    <!-- Header -->
    <header class="main_header w_full">
        <img
            onclick="redirectToDashboard()"
            src="../../assets/icons/media-markt-logo-png_seeklogo-90300.png"
            alt="MediaMarkt – Strategic Assortment"
        />

        <div
            id="head_content_right"
            class="d_flex_cc_gm head_content_right"
        ></div>
    </header>

    <!-- Hauptbereich -->
    <main class="w_full d_flex_cc_gl">
        <form
            onsubmit="logInSubmit(event)"
            class="std_form d_flex_cs_gl f_d_c"
            id="loginForm"
        >
            <h1 class="font_prime_color d_flex_cs_gl w_full">
                Log in
            </h1>

            <p class="font_white_color d_flex_cs_gl w_full">
                Turn assortment decisions into clear action.
            </p>

            <!-- E-Mail -->
            <div
                error="false"
                id="email_group"
                class="form_group_w_icon_wo_label w_full"
            >
                <img
                    src="../../assets/icons/mail_icon.svg"
                    alt=""
                    aria-hidden="true"
                />

                <input
                    onblur="validateEmail(this)"
                    type="text"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                />

                <label for="email">
                    Email
                </label>

                <p class="error_label">
                    Please enter a valid email address.
                </p>
            </div>

            <!-- Passwort -->
            <div
                error="false"
                id="password_group"
                class="form_group_w_icon_wo_label w_full"
            >
                <img
                    src="../../assets/icons/password_icon.svg"
                    alt=""
                    aria-hidden="true"
                />

                <input
                    onblur="validateLoginPW(this)"
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                />

                <label for="password">
                    Password
                </label>

                <img
                    onclick="togglePassword(this)"
                    class="password_eye"
                    src="../../assets/icons/pw_visibility.svg"
                    alt="Show or hide password"
                />

                <p class="error_label">
                    Password is required.
                </p>
            </div>

            <!-- Loginfehler -->
            <p
                id="error_login"
                error="false"
                class="login_error"
            >
                Benutzer oder Passwort falsch
            </p>

            <!-- Buttons -->
            <div class="d_flex_cc_gl f_d_r_resp_c w_full">
                <button
                    type="submit"
                    class="std_btn btn_prime pad_s d_flex_cc_gs"
                >
                    <img
                        src="../../assets/icons/login_icon.svg"
                        alt=""
                        aria-hidden="true"
                    />

                    Log in
                </button>

                <button
                    type="button"
                    onclick="guestLogin()"
                    class="std_btn btn_third pad_s"
                >
                    Guest Log in
                </button>
            </div>

            <!-- Registrierung -->
            <div class="d_flex_cc_gl f_d_r_resp_c w_full">
                <p class="font_white_color">
                    First time here?
                </p>

                <a
                    href="./register.html"
                    class="link_prime d_flex_cc_gm"
                >
                    Sign Up now!
                </a>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer class="main_footer w_full">
        <nav class="d_flex_cs_gl">
            <a
                href="../privacy/index.html"
                class="link"
            >
                Privacy Policy
            </a>

            <a
                href="../imprint/index.html"
                class="link"
            >
                Imprint
            </a>
        </nav>
    </footer>
</body>

</html>
